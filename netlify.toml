[build]
  # The directory where the built assets will be output, relative to the root directory
  publish = "frontend/dist"
  
  # The command to run to build the project, including changing into the frontend directory
  command = "cd frontend && npm run build"

[[redirects]]
  # Redirect all requests to index.html for Single Page Application routing
  from = "/*"
  to = "/index.html"
  status = 200
